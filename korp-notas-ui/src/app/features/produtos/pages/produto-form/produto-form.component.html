<div class="page">
  <h2>Novo Produto</h2>

  <mat-card>
    <form [formGroup]="form" (ngSubmit)="salvar()">
      <div class="form-grid">
        <mat-form-field appearance="outline">
          <mat-label>Codigo</mat-label>
          <input matInput formControlName="codigo" />
          <mat-error *ngIf="form.controls.codigo.hasError('required')">Campo obrigatorio</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Descricao</mat-label>
          <input matInput formControlName="descricao" />
          <mat-error *ngIf="form.controls.descricao.hasError('required')">Campo obrigatorio</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Saldo</mat-label>
          <input matInput type="number" formControlName="saldo" />
          <mat-error *ngIf="form.controls.saldo.hasError('required')">Campo obrigatorio</mat-error>
          <mat-error *ngIf="form.controls.saldo.hasError('min')">O saldo nao pode ser negativo</mat-error>
        </mat-form-field>
      </div>

      <mat-progress-bar *ngIf="loading" mode="indeterminate"></mat-progress-bar>

      <div *ngIf="error" class="error-message">
        {{ error }}
      </div>

      <div class="actions">
        <button mat-button type="button" routerLink="/produtos">Cancelar</button>
        <button mat-raised-button color="primary" type="submit">Salvar</button>
      </div>
    </form>
  </mat-card>
</div>
